# Конфиг уровней моделей для router_ai_client.
#
# Логика уровней — см. functional_plan_ui.md, §4. Три уровня + эмбеддинги,
# ничего не хардкодится в коде модулей — только здесь. Цены на OpenRouter
# меняются часто: перед серьёзной нагрузкой сверить на https://openrouter.ai/models.
#
# provider на уровне (nano/flash/pro) — необязательное поле, по умолчанию
# "openrouter". "gemini_direct" — прямой вызов Google Generative Language API
# по корпоративному ключу (GEMINI_API_KEY в .env), бесплатный тир, без
# комиссии OpenRouter. См. client.py, класс RouterAIClient, для деталей.
#
# Если/когда перейдём на локальную LLM (см. PROGRESS.md) — этот файл не
# трогаем, меняем только base_url и ключ в .env на OpenAI-совместимый
# локальный сервер (Ollama/vLLM/LM Studio), и, при необходимости, имена
# моделей ниже на локальные.

tiers:
  # Уровень 0 (без LLM) сюда не входит — он реализуется прямым кодом
  # (подсветка упоминаний, diff обновлений задач), см. functional_plan_ui.md.

  nano:
    # Классификация задачи по теме (разово, с кэшем), короткие
    # пофразовые суммаризации в map-стадии суммаризации Discord.
    # 2026-07-19: переведён на gemini_direct (бесплатный корпоративный ключ) —
    # самый частый уровень по объёму вызовов, тут основная экономия.
    #
    # 2026-07-19 (тот же день, найдено при живой проверке): google/gemini-2.5-
    # flash-lite перестал отвечать этому ключу через ПРЯМОЙ Gemini API — 404
    # "no longer available to new users" (модель формально ещё в каталоге
    # ListModels, но этому конкретному API-ключу/проекту generateContent на
    # неё больше не даёт, видимо ограничение бесплатного тира для новых
    # ключей). Через OpenRouter эта же модель по-прежнему работает нормально
    # (платный каталог, отдельное ограничение туда не распространяется) —
    # поэтому у модели теперь РАЗНЫЕ имена на разных провайдеров, см.
    # openrouter_model ниже и client.py (chat() выбирает нужное имя по
    # фактическому provider, не только по дефолтному из этого файла).
    #
    # model (для gemini_direct) — алиас gemini-flash-lite-latest, Google сам
    # обновляет версию под ним, уведомление за 2 недели перед сменой (см.
    # ai.google.dev/gemini-api/docs/models). openrouter_model — обычное имя
    # из каталога OpenRouter, используется, когда пользователь явно выбрал
    # провайдера "OpenRouter" в UI (переопределяет provider по умолчанию).
    provider: gemini_direct
    model: google/gemini-flash-lite-latest
    openrouter_model: google/gemini-2.5-flash-lite
    max_tokens: 500
    temperature: 0.2

  flash:
    # Обычные RAG-ответы, обычные сводные отчёты, reduce-стадия суммаризации.
    # 2026-07-19: тоже gemini_direct — та же модель, что раньше была через
    # OpenRouter, просто без комиссии посредника.
    #
    # 2026-07-19 (тот же день): та же история, что у nano — google/gemini-2.5-
    # flash тоже вернул 404 "no longer available to new users" этому ключу
    # через ПРЯМОЙ Gemini API. См. комментарий у nano выше — то же самое
    # разделение имени на provider.
    provider: gemini_direct
    model: google/gemini-flash-latest
    openrouter_model: google/gemini-2.5-flash
    max_tokens: 2000
    temperature: 0.3

  pro:
    # Только по явной эскалации: сложные вопросы по многим источникам сразу,
    # запрос "разберись подробно". Оставлен на OpenRouter — это Claude, его
    # бесплатный Gemini API не даёт, а объём вызовов тут низкий (эскалация),
    # так что экономия от переноса была бы небольшой ценой качества ответа.
    model: anthropic/claude-sonnet-4.6
    max_tokens: 4000
    temperature: 0.3

embedding:
  model: openai/text-embedding-3-small
  # Осознанно зафиксирована одна модель с самого начала — смена модели
  # эмбеддингов на середине проекта требует пересчёта всей базы (несовместимые
  # векторные пространства). Не менять без явного решения пересчитать всё.
