# tracker и fibbee подтверждены пользователем (2026-07-19). servicedesk всё
# ещё ДОГАДКА по структуре API, не подтверждена в браузере — прежде чем
# доверять ссылке в отчётах, открой конкретную заявку в браузере и сверь
# адрес с шаблоном ниже, поправь при расхождении.
#
# Плейсхолдеры подставляются из данных в SQLite соответствующего коннектора.

servicedesk: "https://sd.drinkx.tech/tickets/{code}"    # код вида SD-1025, НЕ ПОДТВЕРЖДЕНО
# Подтверждено пользователем (2026-07-19): путь /services/tickets/, id — ULID
# (не короткий человекочитаемый number вроде 3715, хотя такой тоже есть в
# данных — используется именно ULID). Пример: тикет №3715 →
# https://erp.fibbee.com/services/tickets/01KXXS0R08413J0KFB59Y3TW9W
fibbee: "https://erp.fibbee.com/services/tickets/{ticket_id}"
# Подтверждено пользователем (2026-07-19): .../tasks/{тип}/{код}, тип
# повторяется — сам код уже содержит префикс типа, например .../tasks/DEV/DEV-591.
tracker: "https://tracker.drinkx.tech/tasks/{type}/{code}"
