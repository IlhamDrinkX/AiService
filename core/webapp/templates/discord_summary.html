{% if error %}
<div class="panel" style="border-color:var(--danger)"><strong>Ошибка:</strong> {{ error }}</div>
{% elif summary %}
<details class="panel" open>
  <summary><h2 style="margin:0; display:inline">Сводка за период <span class="muted">({{ count }} сообщений)</span></h2></summary>
  <div class="answer">{{ summary }}</div>
</details>
{% endif %}
